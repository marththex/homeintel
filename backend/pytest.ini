[pytest]
# Pure-unit suite only: no Qdrant, no Ollama, no torch/docling/transformers/
# faster-whisper/qdrant-client/langchain imports. See backend/tests/*.py for
# module-level notes on which product modules were excluded and why.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
