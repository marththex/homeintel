version: "3.9"

# ── Qdrant — standalone Docker Compose ───────────────────────────────────────
#
# Deploy this on whichever machine will host Qdrant (a NAS, a server, or the
# same host as the backend — anywhere reachable over the network from the API).
# Point the backend at it via QDRANT_URL=http://<qdrant-host>:6333
#
# Start:
#   docker compose -f qdrant.yml up -d
#
# Storage path: set QDRANT_STORAGE to an absolute host path to persist data
# elsewhere (e.g. a NAS mount); defaults to ./qdrant_storage next to this file.
# ─────────────────────────────────────────────────────────────────────────────

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API (used by Python client)
      - "6334:6334"   # gRPC (optional)
    volumes:
      - ${QDRANT_STORAGE:-./qdrant_storage}:/qdrant/storage
    # No environment block — omitting QDRANT__SERVICE__API_KEY means no auth
    # required. If you add auth later, set it explicitly (empty string triggers
    # a Qdrant bug that requires a key but rejects everything).
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
