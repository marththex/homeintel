version: "3.9"

# ── Qdrant — NAS-side Docker Compose ─────────────────────────────────────────
#
# Deploy this on TrueNAS (copy to <NAS_ROOT>/docker/qdrant/).
# The PC backend connects to it via QDRANT_URL=http://<NAS_IP>:6333
#
# Start:
#   docker compose -f qdrant.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API (used by Python client)
      - "6334:6334"   # gRPC (optional)
    volumes:
      - /nfs/qdrant_storage:/qdrant/storage   # persists on NAS-shared /nfs/
    # No environment block — omitting QDRANT__SERVICE__API_KEY means no auth
    # required. If you add auth later, set it explicitly (empty string triggers
    # a Qdrant bug that requires a key but rejects everything).
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
